<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
window["ai_edge_gallery_get_result"] = async (data, secret) => {
  try {
    const jsonData = JSON.parse(data);
    const query = jsonData.query;
    const maxResults = jsonData.max_results || 5;

    if (!query) {
      return JSON.stringify({ error: "No search query provided." });
    }
    if (!secret) {
      return JSON.stringify({ error: "No xAI API key provided. Please enter your key in the skill settings." });
    }

    const response = await fetch("https://api.x.ai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${secret}`
      },
      body: JSON.stringify({
        model: "grok-3",
        messages: [
          {
            role: "system",
            content: `You are a search assistant. Search X for the given query and return the top ${maxResults} relevant posts/results. For each result include: author, content snippet, and date if available. Format the output clearly and concisely.`
          },
          {
            role: "user",
            content: `Search X for: ${query}`
          }
        ],
        search_parameters: {
          mode: "on",
          sources: [{ type: "x" }],
          max_search_results: maxResults
        }
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      return JSON.stringify({ error: `xAI API error ${response.status}: ${err?.error?.message || response.statusText}` });
    }

    const responseData = await response.json();
    const content = responseData?.choices?.[0]?.message?.content;

    if (!content) {
      return JSON.stringify({ error: "No results returned from xAI API." });
    }

    // Truncate if too long for context
    const truncated = content.length > 4000
      ? content.substring(0, 4000) + "\n\n... [TRUNCATED]"
      : content;

    return JSON.stringify({ result: truncated });

  } catch (e) {
    return JSON.stringify({ error: `X Search failed: ${e.message}` });
  }
};
</script>
</body>
</html>
