<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
window["ai_edge_gallery_get_result"] = async (data, secret) => {
  try {
    const jsonData = JSON.parse(data);
    const query = jsonData.query;
    const maxResults = jsonData.max_results || 5;

    if (!query) {
      return JSON.stringify({ error: "No search query provided." });
    }
    if (!secret) {
      return JSON.stringify({ error: "No xAI API key. Please configure it in skill settings." });
    }

    // Use corsproxy.io to handle CORS in webview
    const apiUrl = "https://corsproxy.io/?" + encodeURIComponent("https://api.x.ai/v1/responses");

    const response = await fetch(apiUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + secret.trim()
      },
      body: JSON.stringify({
        model: "grok-4-1-fast-non-reasoning",
        input: [
          {
            role: "user",
            content: "Search X for recent posts about: " + query + ". Summarize the top " + maxResults + " most relevant results with author names and dates."
          }
        ],
        tools: [{ type: "x_search" }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      return JSON.stringify({ error: "xAI API error " + response.status + ": " + (err?.error || response.statusText) });
    }

    const responseData = await response.json();

    // Find the assistant message in the output array
    const msgItem = responseData.output && responseData.output.find(o => o.type === "message");
    const content = msgItem && msgItem.content && msgItem.content[0] && msgItem.content[0].text;

    if (!content) {
      return JSON.stringify({ error: "No results returned." });
    }

    const truncated = content.length > 3500
      ? content.substring(0, 3500) + "\n\n... [TRUNCATED]"
      : content;

    return JSON.stringify({ result: truncated });

  } catch (e) {
    return JSON.stringify({ error: "X Search failed: " + e.message });
  }
};
</script>
</body>
</html>
